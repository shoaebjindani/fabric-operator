            path: images.hsmImage
          - description: HSMTag is the tag of the HSM image
            displayName: HSMTag
            path: images.hsmTag
          - description: Ingress (Optional) is ingress object for ingress overrides
            displayName: Ingress
            path: ingress
          - description: Class (Optional) is the class to set for ingress
            displayName: Class
            path: ingress.class
          - description:
              TlsSecretName (Optional) is the secret name to be used for tls
              certificates
            displayName: Tls Secret Name
            path: ingress.tlsSecretName
          - description: License should be accepted by the user to be able to setup CA
            displayName: License
            path: license
          - description: Accept should be set to true to accept the license. https://ibm.biz/ibm-hlfsupport-rhm-license
            displayName: Accept
            path: license.accept
            value:
              - false
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:checkbox
          - description:
              NumSecondsWarningPeriod (Optional - default 30 days) is used
              to define certificate expiry warning period.
            displayName: Num Seconds Warning Period
            path: numSecondsWarningPeriod
          - description:
              Region (Optional) is the region of the nodes where the CA should
              be deployed
            displayName: Region
            path: region
          - description: RegistryURL is registry url used to pull images
            displayName: Registry URL
            path: registryURL
          - description:
              Replicas (Optional - default 1) is the number of CA replicas
