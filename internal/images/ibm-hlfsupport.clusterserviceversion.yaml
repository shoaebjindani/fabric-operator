    description: |
      IBM® Support for Hyperledger Fabric provides a managed and full stack blockchain-as-a-service (BaaS) offering that allows you to deploy blockchain components. This offering is ideal for the customers who want to deploy their components, store their data, or run their workloads on their own infrastructure or across public and private clouds for security, risk mitigation, preference, or compliance reasons. Clients can build, operate, and grow their blockchain networks with an offering that can be used from development through production.
      Supported Versions: Openshift 4.6+
