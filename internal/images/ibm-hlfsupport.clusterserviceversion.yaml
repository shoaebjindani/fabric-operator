  description: |
    # Introduction
    IBM® Support for Hyperledger Fabric is the commercial distribution of the open source Hyperledger Fabric that provides a managed and full stack blockchain-as-a-service (BaaS) offering for deploying blockchain components. This offering is ideal for the customers who want to deploy their components, store their data, or run their workloads on their own infrastructure or across public and private clouds for security, risk mitigation, preference, or compliance reasons. Clients can build, operate, and grow their blockchain networks with an offering that can be used from development through production.
    Supported Versions: Openshift 4.7, 4.8 and 4.9
    ## Details
    You can install the operator and then run it to deploy the IBM Support for Hyperledger Fabric console user interface (UI) that is used to deploy Certificate Authority (CA), orderer, and peer nodes that are based on Hyperledger Fabric v2.2.8 and 2.4.6. After you run the operator to deploy the console UI, see the [Build a network tutorial](https://www.ibm.com/docs/en/hlf-support/1.0.0?topic=started-build-network#ibm-hlfsupport-console-build-network) to easily get started building a blockchain network.
    ## Prerequisites
      1. The IBM Support for Hyperledger Fabric can be installed on [OpenShift Container Platform](https://docs.openshift.com) 4.6 and higher.
      2. You need to install and connect to your cluster by using [OpenShift Container Platform CLI](https://docs.openshift.com/container-platform/4.6/cli_reference/openshift_cli/getting-started-cli.html) to deploy the platform.
      3. Each blockchain network that you deploy with the IBM Support for Hyperledger Fabric requires its own OpenShift project. For example, if you plan to create different networks for development, staging, and production, then you need to create a unique project for each environment. Each project creates a new Kubernetes namespace. Using a separate namespace provides each network with separate resources and allows you to set unique access policies for each network. You need to follow these deployment instructions to deploy a separate operator and console for each project. Only one console can be deployed to a project at a time.
      4. A 30 day free trial is available from the [Red Hat Marketplace](https://marketplace.redhat.com/en-us/products/ibm-blockchain).
      5. Review the storage requirements for your PVC in the **Storage** section of this README.
    ## Limitations
    Before you begin, ensure that you understand the following limitations:
      - IBM Support for Hyperledger Fabric 1.0.0 is supported on Red Hat OpenShift 4.7, 4.8 and 4.9.
      - The offering does not include an entitlement to OpenShift.
      - You are responsible for the management of health monitoring, security, logging, and resource usage of your blockchain components.
      - The console creates nodes based on the Hyperledger Fabric v2.2.8 and 2.4.6 node images.
      - You can only import nodes that have been exported from other IBM Support for Hyperledger Fabric consoles. In order to be able to operate an imported peer or ordering node from the console, you also need to import the associated node's organization MSP definition and administrator identity into your console.
      - Mutual Transport Layer Security (TLS) is not supported between your applications and your blockchain nodes.
      - You can not use the ESR version of Firefox to log in to the IBM Support for Hyperledger Fabric console.
    ## Resources Required
    Ensure that your OpenShift cluster has sufficient resources for the IBM Support for Hyperledger Fabric console and for the blockchain nodes that you create. The amount of resources that are required can vary depending on your infrastructure, network design, and performance requirements. To help you plan your resource requirements, the default CPU, memory, and storage requirements for each component type are provided in this table. Your actual resource allocations are visible in your blockchain console when you deploy a node and can be adjusted at deployment time or after deployment according to your business needs.
    | **Component** (all containers) | CPU**   | Memory (GB) | Storage (GB) |
    |--------------------------------|---------|-------------|--------------|
    | **Peer (Hyperledger Fabric v2.x)** | 0.7 | 2.0         | 200 (includes 100GB for peer and 100GB for state database)|
    | **CA**                         | 0.1     | 0.2         | 20            |
    | **Ordering node**              | 0.35    | 0.7         | 100           |
    | **Operator**                   | 0.1     | 0.2         | 0             |
    | **Console**                    | 1.2     | 2.4         | 10            |
    | **Webhook**                    | 0.1     | 0.2         | 0             |
    ** These values can vary slightly. Actual VPC allocations are visible in the blockchain console when a node is deployed.
    ## Storage
    The IBM Support for Hyperledger Fabric requires persistent storage for each CA, peer, and ordering node that you deploy, in addition to the console and platform tooling. The IBM Support for Hyperledger Fabric console uses [dynamic provisioning](https://docs.openshift.com/container-platform/4.3/storage/dynamic-provisioning.html) to allocate storage for each blockchain node that you deploy. Before you use the console or the APIs to deploy any node, you have the opportunity to choose your persistent storage from the available persistent storage options in OpenShift Container Platform. Create a storage class with a sufficient amount of backing storage for your IBM Support for Hyperledger Fabric and the nodes that you create. You can set this storage class to the default storage class of your Kubernetes cluster, or specify this class when you deploy the IBM Support for Hyperledger Fabric console. If you are using a multi-zone cluster in OCP, then you must configure the default storage class for each zone. After you create the storage class, run the command `kubectl patch storageclass` to set the storage class of the multizone region to be the default storage class.
    **Note:** If you prefer not to choose a persistent storage option, the default storage class of your Kubernetes cluster is used.
    ## Installing
    These instructions are for installing the platform from the Red Hat Marketplace. If you need to perform an air-gapped or on-prem installation see [Deploy from Red Hat Marketplace on-prem](https://www.ibm.com/docs/en/hlf-support/1.0.0?topic=options-deploy-from-red-hat-marketplace-airgap-installation).
      1. These instructions assume you already have a Kubernetes cluster available in OpenShift Container Platform v4.6+ and that you have created a project for your IBM Support for Hyperledger Fabric deployment. Unsure how to create a project? See Create a new project for your IBM Support for Hyperledger Fabric deployment.
      2. Browse to the [Red Hat Marketplace](https://marketplace.redhat.com) and log in or create a new account.
      3. Follow the instructions to [register your OpenShift cluster](https://marketplace.redhat.com/en-us/documentation/clusters#register-openshift-cluster-with-red-hat-marketplace) with the Red Hat Marketplace.
      4. When prompted "Would you like to go back to the Red Hat Marketplace now? [Y/n]", type Y and the Red Hat Marketplace page is opened in your browser.
      5. Click **My software** > **Visit the Marketplace**.
      5. In the search bar, type blockchain to load the Blockchain tile.
      6. Click **Purchase** to get started. From the Purchase complete page, click **Install now**. This installs the IBM Support for Hyperledger Fabric operator into your cluster. Note that during the installation process you are required to select which OpenShift project to deploy the operator to from the Namespace scope drop-down list. After the operator is installed, your cluster connects back to Red Hat Marketplace and then becomes a target cluster for installing and managing the operator from Red Hat Marketplace.
    ## SecurityContextConstraints Requirements
    After installing the operator, the IBM Support for Hyperledger Fabric requires a custom Security Context Constraint to be applied to your OpenShift project.  Refer to instructions in the IBM Support for Hyperledger Fabric documentation for [Apply the Security Context Constraint](https://www.ibm.com/docs/en/hlf-support/1.0.0?topic=options-deploy-from-red-hat-marketplace).
    ## Configuration
    After installing the operator and configuring the Security Context Constraint, you are ready to deploy the console user UI. See instructions in the product documentation check for the section `Deploy the Fabric Operations Console` for [deploying the fabric operations console] (https://www.ibm.com/docs/en/hlf-support/1.0.0?topic=options-deploy-from-red-hat-marketplace).
