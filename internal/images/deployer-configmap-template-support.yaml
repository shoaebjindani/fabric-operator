            chaincodeLauncherDigest: ccbuilder22digest
            builderImage: REGISTRY_NAMESPACE-ccenv
            builderTag: ccenv22tag
            builderDigest: ccenv22digest
            goEnvImage: REGISTRY_NAMESPACE-goenv
            goEnvTag: goenv22tag
            goEnvDigest: goenv22digest
            javaEnvImage: REGISTRY_NAMESPACE-javaenv
