apiVersion: v1
kind: ConfigMap
metadata:
  name: ibpconsole-deployer-template
data:
  settings.yaml: |
    db:
      connectionurl: "http://localhost:5984"
      createdb: true
      components:
        name: "components"
        designdocs:
        - ./designdocs/components/service_broker.json
        - ./designdocs/components/deployer.json
        - ./designdocs/components/plutus.json
        - ./designdocs/components/search_indices.json
    port: 8080
    loglevel: debug
    tls:
      enabled: false
      certpath: /certs/tls.crt
      keypath: /certs/tls.key
    auth:
      username: dev
      password: dev123
    imagePullSecret: ""
    versions:
      ca:
        1.5.9-2:
          default: true
          version: 1.5.9-2
          image:
            caInitImage: REGISTRY_NAMESPACE-init
            caInitTag: 
            caInitDigest: 
            caImage: REGISTRY_NAMESPACE-ca
            caTag: 
            caDigest: 
            enrollerImage: REGISTRY_NAMESPACE-enroller
            enrollerTag: 
            enrollerDigest: 
      peer:
        2.2.15-2:
          default: true
          version: 2.2.15-2
          image:
            peerInitImage: REGISTRY_NAMESPACE-init
            peerInitTag: 
            peerInitDigest: 
            peerImage: REGISTRY_NAMESPACE-peer
            peerTag: peer22tag
            peerDigest: peer22digest
            couchdbImage: REGISTRY_NAMESPACE-couchdb
            couchdbTag: couchdb312tag
            couchdbDigest: couchdb312digest
            grpcwebImage: REGISTRY_NAMESPACE-grpcweb
            grpcwebTag: 
            grpcwebDigest: 
            chaincodeLauncherImage: REGISTRY_NAMESPACE-chaincode-launcher
