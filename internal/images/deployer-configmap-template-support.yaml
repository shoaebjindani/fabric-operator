            chaincodeLauncherDigest: ccbuilder25digest
            builderImage: REGISTRY_NAMESPACE-ccenv
            builderTag: ccenv25tag
            builderDigest: ccenv25digest
            goEnvImage: REGISTRY_NAMESPACE-goenv
            goEnvTag: goenv25tag
            goEnvDigest: goenv25digest
            javaEnvImage: REGISTRY_NAMESPACE-javaenv
            javaEnvTag: javaenv25tag
            javaEnvDigest: javaenv25digest
            nodeEnvImage: REGISTRY_NAMESPACE-nodeenv
            nodeEnvTag: nodeenv25tag
            nodeEnvDigest: nodeenv25digest
            enrollerImage: REGISTRY_NAMESPACE-enroller
            enrollerTag: 
            enrollerDigest:  
