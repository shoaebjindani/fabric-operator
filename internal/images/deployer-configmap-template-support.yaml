            nodeEnvDigest: nodeenv22digest
            enrollerImage: REGISTRY_NAMESPACE-enroller
            enrollerTag: 
            enrollerDigest: 
        2.5.6-2:
          default: false
          version: 2.5.6-2
          image:
            peerInitImage: REGISTRY_NAMESPACE-init
            peerInitTag: 
            peerInitDigest: 
            peerImage: REGISTRY_NAMESPACE-peer
            peerTag: peer25tag
            peerDigest: peer25digest
            couchdbImage: REGISTRY_NAMESPACE-couchdb
